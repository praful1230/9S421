<!DOCTYPE html>
<html>

<head>
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
        font-family: Arial;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        box-shadow: 0px 0px 10px gray;
    }

    input {
        width: 70%;
        padding: 10px;
    }

    button {
        padding: 10px;
        cursor: pointer;
    }

    li {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        margin-top: 10px;
        background: #eee;
    }
</style>

<body>

    <div class="container">
        <h1>My Todo App</h1>

        <input type="text" id="taskInput">

        <button id="addBtn">
            Add Task
        </button>

        <ul id="taskList">

        </ul>
    </div>

    <script>

        let input=document.getElementById('taskInput');
        let button=document.getElementById('addBtn');
        let taskname=document.getElementById('taskList')

        button.addEventListener("click",function(){
            let task=input.value;

            if(task===""){
                alert("its empty");
            }
            let li=document.createElement('li');

            li.innerHTML=`${task}<button id="delbtn">Delete</button>`

            taskname.append(li)
            input.value="";

            let del=li.querySelector('#delbtn');

            del.addEventListener("click",function(){
                li.remove();
            })


        })

    </script>
</body> 

</html>
