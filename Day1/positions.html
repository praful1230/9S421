<!DOCTYPE html>
<html>
<head>
    <style>
        .parent {
            height: 300px;
            width: 500px;
            border: 2px solid black;
            position: relative; /* Parent is now reference */
            margin: 50px;
        }

        .relative-box {
            position: relative;
            top: 20px;
            left: 20px;

            width: 100px;
            height: 100px;
            border: 2px solid blue;
        }

        .absolute-box {
            position: absolute;
            top: 50px;
            right: 20px;

            width: 100px;
            height: 100px;
            border: 2px solid red;
        }
    </style>
</head>
<body>

    <div class="parent">

        <div class="relative-box">
            Relative
        </div>

        <div class="absolute-box">
            Absolute
        </div>

    </div>

</body>
</html>
